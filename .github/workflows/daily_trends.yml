name: Daily Tech Trends

on:
  schedule:
    - cron: '3 14 * * *'  # 7:03 AM PDT (UTC-7)
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  fetch-trends:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to push the committed note back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trends script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          OUTPUT_DIR: ${{ github.workspace }}/vault
        run: python programming_trends/main.py

      - name: Commit and push note
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vault/
          git diff --staged --quiet || (
            git commit -m "chore: daily tech trends $(date +%Y-%m-%d)" &&
            git push
          )
